<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>gridterm</title>
    <link rel="stylesheet" href="vendor/xterm.css" />
    <link rel="stylesheet" href="styles.css" />
    <script type="module" src="/main.js" defer></script>
  </head>
  <body>
    <div class="app">
      <div class="titlebar">
        <div class="titlebar-left">
          <span class="brand" data-tauri-drag-region>GRIDTERM</span>
          <div class="col-picker" id="col-picker">
            <button data-n="1" aria-label="toggle column 1"></button>
            <button data-n="2" aria-label="toggle column 2"></button>
            <button data-n="3" aria-label="toggle column 3"></button>
          </div>
        </div>
        <div class="titlebar-drag" data-tauri-drag-region></div>
        <div class="window-controls">
          <button id="settings-btn" class="gear wc" aria-label="settings" title="settings">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
          </button>
          <button id="win-min" class="wc" aria-label="minimize">
            <svg width="10" height="10" viewBox="0 0 10 10"><line x1="1" y1="5" x2="9" y2="5" stroke="currentColor" stroke-width="1"/></svg>
          </button>
          <button id="win-max" class="wc" aria-label="maximize">
            <svg width="10" height="10" viewBox="0 0 10 10"><rect x="1.5" y="1.5" width="7" height="7" fill="none" stroke="currentColor" stroke-width="1"/></svg>
          </button>
          <button id="win-close" class="wc wc-close" aria-label="close">
            <svg width="10" height="10" viewBox="0 0 10 10"><line x1="1.5" y1="1.5" x2="8.5" y2="8.5" stroke="currentColor" stroke-width="1"/><line x1="8.5" y1="1.5" x2="1.5" y2="8.5" stroke="currentColor" stroke-width="1"/></svg>
          </button>
        </div>
      </div>
      <div class="grid" id="grid"></div>
    </div>
    <div id="settings-modal" class="settings-panel">
      <div class="modal">
        <div class="modal-header">
          <div class="modal-title">SETTINGS</div>
          <div class="modal-header-actions">
            <button id="settings-reset-all" class="icon-btn" aria-label="reset defaults" title="reset defaults">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="1 4 1 10 7 10"/>
                <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
              </svg>
            </button>
            <button id="settings-save" class="icon-btn" aria-label="save settings" title="save settings">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"/>
              </svg>
            </button>
            <button id="settings-close" class="icon-btn" aria-label="close">
              <svg width="12" height="12" viewBox="0 0 10 10"><line x1="1.5" y1="1.5" x2="8.5" y2="8.5" stroke="currentColor" stroke-width="1.2"/><line x1="8.5" y1="1.5" x2="1.5" y2="8.5" stroke="currentColor" stroke-width="1.2"/></svg>
            </button>
          </div>
        </div>
        <div class="modal-body panel-body">
          <div class="panel-col panel-col-power">
            <div class="setting-section">On reset, launch</div>
            <div class="auto-cli-rows">
              <div class="auto-cli-row">
                <span class="slot-dot" data-auto-cli-dot="0"></span>
                <input type="text" class="auto-cli-input" data-auto-cli-input="0" spellcheck="false" placeholder="claude" />
              </div>
              <div class="auto-cli-row">
                <span class="slot-dot" data-auto-cli-dot="1"></span>
                <input type="text" class="auto-cli-input" data-auto-cli-input="1" spellcheck="false" placeholder="claude" />
              </div>
              <div class="auto-cli-row">
                <span class="slot-dot" data-auto-cli-dot="2"></span>
                <input type="text" class="auto-cli-input" data-auto-cli-input="2" spellcheck="false" placeholder="claude" />
              </div>
            </div>
          </div>
          <div class="panel-col panel-col-fonts">
            <div class="setting-section">Fonts</div>
            <div class="setting-row">
              <label for="setting-font-family">Font</label>
              <select id="setting-font-family" class="modal-select"></select>
            </div>
            <div class="setting-row">
              <label for="setting-font-size">Font size</label>
              <div class="font-size-control">
                <input id="setting-font-size" type="number" min="8" max="32" step="1" />
                <button id="font-size-dec" class="stepper" aria-label="decrease">−</button>
                <button id="font-size-inc" class="stepper" aria-label="increase">+</button>
              </div>
            </div>
            <div class="setting-row">
              <label for="setting-font-weight">Font weight</label>
              <select id="setting-font-weight" class="modal-select"></select>
            </div>
          </div>
          <div class="panel-col panel-col-colors">
            <div class="setting-section">Colors</div>
            <div class="colors-grid">
              <div class="cg-label cg-r1">Terminal 1 color</div>
              <div class="cg-accent cg-r1 bg-control">
                <input type="color" class="slot-bg-input" data-slot-accent-input="0" />
                <input type="text" class="slot-bg-hex" data-slot-accent-hex="0" spellcheck="false" />
              </div>
              <div class="cg-bg cg-r1 bg-control">
                <span class="pair-label">Background color</span>
                <input type="color" class="slot-bg-input" data-slot-input="0" />
                <input type="text" class="slot-bg-hex" data-slot-hex="0" spellcheck="false" />
              </div>
              <div class="cg-fg cg-r1 bg-control">
                <span class="pair-label">Text color</span>
                <input type="color" class="slot-fg-input" data-slot-fg-input="0" />
                <input type="text" class="slot-bg-hex" data-slot-fg-hex="0" spellcheck="false" />
              </div>

              <div class="cg-label cg-r2">Terminal 2 color</div>
              <div class="cg-accent cg-r2 bg-control">
                <input type="color" class="slot-bg-input" data-slot-accent-input="1" />
                <input type="text" class="slot-bg-hex" data-slot-accent-hex="1" spellcheck="false" />
              </div>
              <div class="cg-bg cg-r2 bg-control">
                <span class="pair-label">Background color</span>
                <input type="color" class="slot-bg-input" data-slot-input="1" />
                <input type="text" class="slot-bg-hex" data-slot-hex="1" spellcheck="false" />
              </div>
              <div class="cg-fg cg-r2 bg-control">
                <span class="pair-label">Text color</span>
                <input type="color" class="slot-fg-input" data-slot-fg-input="1" />
                <input type="text" class="slot-bg-hex" data-slot-fg-hex="1" spellcheck="false" />
              </div>

              <div class="cg-label cg-r3">Terminal 3 color</div>
              <div class="cg-accent cg-r3 bg-control">
                <input type="color" class="slot-bg-input" data-slot-accent-input="2" />
                <input type="text" class="slot-bg-hex" data-slot-accent-hex="2" spellcheck="false" />
              </div>
              <div class="cg-bg cg-r3 bg-control">
                <span class="pair-label">Background color</span>
                <input type="color" class="slot-bg-input" data-slot-input="2" />
                <input type="text" class="slot-bg-hex" data-slot-hex="2" spellcheck="false" />
              </div>
              <div class="cg-fg cg-r3 bg-control">
                <span class="pair-label">Text color</span>
                <input type="color" class="slot-fg-input" data-slot-fg-input="2" />
                <input type="text" class="slot-bg-hex" data-slot-fg-hex="2" spellcheck="false" />
              </div>

              <button class="v-link v-link-accent" data-link="accent" aria-label="link accents" title="link accents">
                <span class="v-link-badge">
                  <svg width="9" height="11" viewBox="0 0 11 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M5.5 4 v-1 a2 2 0 0 1 2 -2 h0 a2 2 0 0 1 2 2 v2 a2 2 0 0 1 -2 2 h-4 a2 2 0 0 0 -2 2 v2 a2 2 0 0 0 2 2 h0 a2 2 0 0 0 2 -2 v-1"/>
                  </svg>
                </span>
              </button>
              <button class="v-link v-link-bg" data-link="bg" aria-label="link backgrounds" title="link backgrounds">
                <span class="v-link-badge">
                  <svg width="9" height="11" viewBox="0 0 11 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M5.5 4 v-1 a2 2 0 0 1 2 -2 h0 a2 2 0 0 1 2 2 v2 a2 2 0 0 1 -2 2 h-4 a2 2 0 0 0 -2 2 v2 a2 2 0 0 0 2 2 h0 a2 2 0 0 0 2 -2 v-1"/>
                  </svg>
                </span>
              </button>
              <button class="v-link v-link-fg" data-link="fg" aria-label="link text colors" title="link text colors">
                <span class="v-link-badge">
                  <svg width="9" height="11" viewBox="0 0 11 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M5.5 4 v-1 a2 2 0 0 1 2 -2 h0 a2 2 0 0 1 2 2 v2 a2 2 0 0 1 -2 2 h-4 a2 2 0 0 0 -2 2 v2 a2 2 0 0 0 2 2 h0 a2 2 0 0 0 2 -2 v-1"/>
                  </svg>
                </span>
              </button>
            </div>
          </div>
          <div class="panel-col panel-col-behavior">
            <div class="setting-section">Inactive terminals</div>
            <div class="segmented" role="radiogroup" aria-label="inactive terminals">
              <button type="button" class="seg-btn" data-dim="on" role="radio" aria-checked="true">Dim</button>
              <button type="button" class="seg-btn" data-dim="off" role="radio" aria-checked="false">Off</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
